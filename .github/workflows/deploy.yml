name: 🎀 Deploy BibelôCRM

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: bibelo-production
  cancel-in-progress: false

env:
  APP_DIR: /opt/bibelocrm

jobs:
  build:
    name: 🧪 Build + Testes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            api/package-lock.json
            frontend/package-lock.json
      - name: Build API
        working-directory: ./api
        run: npm ci && npm run build
        continue-on-error: false
      - name: Build Frontend
        working-directory: ./frontend
        run: npm ci && npm run build
        continue-on-error: false

  deploy:
    name: 🚀 Deploy VPS Hostinger
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configura SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 60222 -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Envia código (rsync)
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='data/' \
            --exclude='backups/' \
            --exclude='logs/' \
            -e "ssh -p 60222 -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no" \
            ./ root@${{ secrets.VPS_HOST }}:${{ env.APP_DIR }}/

      - name: Roda testes na VPS
        run: |
          ssh -p 60222 -i ~/.ssh/id_ed25519 root@${{ secrets.VPS_HOST }} << 'ENDSSH'
            set -e
            cd /opt/bibelocrm
            echo "📦 Instalando dependências de teste..."
            cd api && npm install --prefer-offline --no-audit 2>/dev/null && cd ..
            echo "🧪 Rodando testes..."
            bash scripts/test.sh
            echo "✅ Testes OK — seguindo para deploy"
          ENDSSH

      - name: Deploy zero-downtime
        run: |
          ssh -p 60222 -i ~/.ssh/id_ed25519 root@${{ secrets.VPS_HOST }} << 'ENDSSH'
            set -e
            cd $APP_DIR
            docker compose pull --quiet
            docker compose up -d --build --remove-orphans
            sleep 15
            TRIES=0
            until docker compose exec -T api wget -qO- http://localhost:4000/health \
                    | grep -q '"status":"ok"'; do
              TRIES=$((TRIES + 1))
              [ $TRIES -ge 12 ] && echo "❌ API timeout" && exit 1
              sleep 5
            done
            docker image prune -f --filter "until=24h"
            echo "✅ Deploy concluído!"
          ENDSSH

      - name: Health check
        run: |
          HTTP=$(curl -sk -o /dev/null -w "%{http_code}" \
            "https://${{ secrets.APP_DOMAIN }}/api/health" || echo "000")
          [ "$HTTP" = "200" ] && echo "✅ Online" || (echo "❌ HTTP $HTTP" && exit 1)

      - name: Notifica — sucesso
        if: success()
        run: |
          curl -s -X POST "https://${{ secrets.APP_DOMAIN }}/api/internal/notify" \
            -H "x-internal-key: ${{ secrets.INTERNAL_NOTIFY_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"message\": \"🎀 *BibelôCRM — Deploy OK!*\nCommit: \`${{ github.sha }}\`\nPor: ${{ github.actor }}\"}" \
            || true

      - name: Notifica — falha
        if: failure()
        run: |
          curl -s -X POST "https://${{ secrets.APP_DOMAIN }}/api/internal/notify" \
            -H "x-internal-key: ${{ secrets.INTERNAL_NOTIFY_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"message\": \"❌ *BibelôCRM — Deploy FALHOU!*\nCommit: \`${{ github.sha }}\`\"}" \
            || true

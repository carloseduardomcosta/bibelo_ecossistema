name: bibelocrm

services:

  postgres:
    image: postgres:16-alpine
    container_name: bibelo_postgres
    restart: unless-stopped
    environment:
      TZ:                America/Sao_Paulo
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - bibelo_internal
    mem_limit: 1536m
    cpus: 0.8
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout:  5s
      retries:  5
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }

  redis:
    image: redis:7-alpine
    container_name: bibelo_redis
    restart: unless-stopped
    environment:
      TZ: America/Sao_Paulo
    command: >
      redis-server
      --requirepass ${REDIS_PASS}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy noeviction
    volumes:
      - ./data/redis:/data
    networks:
      - bibelo_internal
    mem_limit: 300m
    cpus: 0.3
    healthcheck:
      test:     ["CMD", "redis-cli", "-a", "${REDIS_PASS}", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5
    logging:
      driver: "json-file"
      options: { max-size: "5m", max-file: "2" }

  api:
    build:
      context:    ./api
      dockerfile: Dockerfile
      target:     production
    container_name: bibelo_api
    restart: unless-stopped
    env_file: .env
    environment:
      TZ:         America/Sao_Paulo
      NODE_ENV:   production
      DB_HOST:    postgres
      REDIS_HOST: redis
    ports:
      - "127.0.0.1:4000:4000"
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    networks:
      - bibelo_internal
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
      - ./data/system-stats.json:/app/data/system-stats.json:ro
      - ./data/firewall-stats.json:/app/data/firewall-stats.json:ro
      - ./data/firewall-pending.json:/app/data/firewall-pending.json
    mem_limit: 1024m
    cpus: 0.8
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout:  10s
      retries:  5
      start_period: 30s
    logging:
      driver: "json-file"
      options: { max-size: "20m", max-file: "5" }

  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
      target:     production
    container_name: bibelo_frontend
    restart: unless-stopped
    environment:
      TZ:            America/Sao_Paulo
      NODE_ENV:      production
      VITE_API_URL:  /api
      VITE_APP_NAME: BibelôCRM
    mem_limit: 256m
    cpus: 0.3
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - bibelo_internal
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }

  medusa:
    build:
      context:    ./medusa
      dockerfile: Dockerfile
      target:     production
    container_name: bibelo_medusa
    restart: unless-stopped
    environment:
      TZ:            America/Sao_Paulo
      NODE_ENV:      production
      DATABASE_URL:  postgresql://${DB_USER}:${DB_PASS}@postgres:5432/medusa_db?sslmode=disable
      REDIS_URL:     redis://:${REDIS_PASS}@redis:6379/2
      JWT_SECRET:    ${MEDUSA_JWT_SECRET}
      COOKIE_SECRET: ${MEDUSA_COOKIE_SECRET}
      STORE_CORS:    ${MEDUSA_STORE_CORS:-http://localhost:8001,https://papelariabibelo.com.br,https://homolog.papelariabibelo.com.br,https://loja.papelariabibelo.com.br}
      ADMIN_CORS:    ${MEDUSA_ADMIN_CORS:-http://localhost:9000,https://api.papelariabibelo.com.br}
      AUTH_CORS:     ${MEDUSA_AUTH_CORS:-http://localhost:8001,https://papelariabibelo.com.br,https://homolog.papelariabibelo.com.br,https://loja.papelariabibelo.com.br}
      PORT:          "9000"
      MP_ACCESS_TOKEN:    ${MP_ACCESS_TOKEN}
      MP_WEBHOOK_SECRET:  ${MP_WEBHOOK_SECRET}
      MP_PUBLIC_KEY:      ${MP_PUBLIC_KEY}
      MP_SANDBOX:         ${MP_SANDBOX:-true}
      ME_CLIENT_ID:       ${ME_CLIENT_ID}
      ME_CLIENT_SECRET:   ${ME_CLIENT_SECRET}
      ME_REDIRECT_URI:    ${ME_REDIRECT_URI}
      ME_SANDBOX:         ${ME_SANDBOX:-false}
      GOOGLE_STORE_CLIENT_ID:     ${GOOGLE_STORE_CLIENT_ID}
      GOOGLE_STORE_CLIENT_SECRET: ${GOOGLE_STORE_CLIENT_SECRET}
      GOOGLE_STORE_CALLBACK_URL:  ${GOOGLE_STORE_CALLBACK_URL}
    ports:
      - "127.0.0.1:9000:9000"
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    networks:
      - bibelo_internal
    mem_limit: 1536m
    cpus: 0.8
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:9000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout:  10s
      retries:  5
      start_period: 60s
    logging:
      driver: "json-file"
      options: { max-size: "20m", max-file: "5" }

  storefront-v2:
    build:
      context:    ./storefront-v2
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_MEDUSA_BACKEND_URL:     http://bibelo_medusa:9000
        NEXT_PUBLIC_MEDUSA_PUBLIC_URL:      https://homolog.papelariabibelo.com.br/api
        NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: ${STOREFRONT_PUBLISHABLE_KEY}
        NEXT_PUBLIC_DEFAULT_REGION:         br
        NEXT_PUBLIC_STORE_NAME:             "Papelaria Bibelô"
        NEXT_PUBLIC_WHATSAPP:               "5547933862514"
        NEXT_PUBLIC_MP_PUBLIC_KEY:          ${MP_PUBLIC_KEY:-}
    container_name: bibelo_storefront_v2
    restart: unless-stopped
    environment:
      TZ:       America/Sao_Paulo
      NODE_ENV: production
      MEDUSA_BACKEND_URL:                  http://bibelo_medusa:9000
      NEXT_PUBLIC_MEDUSA_PUBLIC_URL:       https://homolog.papelariabibelo.com.br/api
      NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: ${STOREFRONT_PUBLISHABLE_KEY}
      NEXT_PUBLIC_MP_PUBLIC_KEY:           ${MP_PUBLIC_KEY:-}
      API_URL:                             http://api:4000
    ports:
      - "127.0.0.1:8001:8001"
    depends_on:
      medusa: { condition: service_healthy }
    networks:
      - bibelo_internal
    mem_limit: 512m
    cpus: 0.5
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8001/', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout:  10s
      retries:  5
      start_period: 45s
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }

  uptime:
    image: louislam/uptime-kuma:1
    container_name: bibelo_uptime
    restart: unless-stopped
    environment:
      TZ: America/Sao_Paulo
    mem_limit: 256m
    cpus: 0.2
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - ./data/uptime:/app/data
    networks:
      - bibelo_internal
    logging:
      driver: "json-file"
      options: { max-size: "5m", max-file: "2" }

  waha:
    image: devlikeapro/waha:latest
    container_name: bibelo_waha
    restart: unless-stopped
    environment:
      TZ:                        America/Sao_Paulo
      WHATSAPP_API_KEY:          "${WAHA_API_KEY}"
      WAHA_LOG_LEVEL:            ERROR
      WAHA_DASHBOARD_ENABLED:        "true"
      WAHA_DASHBOARD_USERNAME:       "${WAHA_DASHBOARD_USER}"
      WAHA_DASHBOARD_PASSWORD:       "${WAHA_DASHBOARD_PASS}"
      WHATSAPP_SWAGGER_ENABLED:      "true"
      WHATSAPP_SWAGGER_USERNAME:     "${WAHA_DASHBOARD_USER}"
      WHATSAPP_SWAGGER_PASSWORD:     "${WAHA_DASHBOARD_PASS}"
    volumes:
      - ./data/waha:/app/.sessions
    ports:
      - "127.0.0.1:3030:3000"
    networks:
      - bibelo_internal
    mem_limit: 512m
    cpus: 0.5
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }

  evolution:
    image: atendai/evolution-api:v2.2.3
    container_name: bibelo_evolution
    restart: unless-stopped
    environment:
      TZ: America/Sao_Paulo
      SERVER_PORT: 8080
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: "postgresql://${DB_USER}:${DB_PASS}@postgres:5432/bibelocrm?schema=evolution"
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "false"
      DATABASE_SAVE_MESSAGE_UPDATE: "false"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "false"
      DATABASE_SAVE_DATA_LABELS: "false"
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: "${EVOLUTION_API_KEY}"
      WEBHOOK_GLOBAL_ENABLED: "false"
      DEL_INSTANCE: "false"
      LOG_LEVEL: "ERROR"
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bibelo_internal
    mem_limit: 512m
    cpus: 0.5
    logging:
      driver: "json-file"
      options: { max-size: "20m", max-file: "5" }

networks:
  bibelo_internal:
    driver: bridge
    name:   bibelo_network
    ipam:
      config:
        - subnet: 172.21.0.0/16

name: bibelocrm

services:

  postgres:
    image: postgres:16-alpine
    container_name: bibelo_postgres
    restart: unless-stopped
    environment:
      TZ:                America/Sao_Paulo
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - bibelo_internal
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout:  5s
      retries:  5
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }

  redis:
    image: redis:7-alpine
    container_name: bibelo_redis
    restart: unless-stopped
    environment:
      TZ: America/Sao_Paulo
    command: >
      redis-server
      --requirepass ${REDIS_PASS}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - ./data/redis:/data
    networks:
      - bibelo_internal
    healthcheck:
      test:     ["CMD", "redis-cli", "-a", "${REDIS_PASS}", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5
    logging:
      driver: "json-file"
      options: { max-size: "5m", max-file: "2" }

  api:
    build:
      context:    ./api
      dockerfile: Dockerfile
      target:     production
    container_name: bibelo_api
    restart: unless-stopped
    env_file: .env
    environment:
      TZ:         America/Sao_Paulo
      NODE_ENV:   production
      DB_HOST:    postgres
      REDIS_HOST: redis
    ports:
      - "127.0.0.1:4000:4000"
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    networks:
      - bibelo_internal
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout:  10s
      retries:  5
      start_period: 30s
    logging:
      driver: "json-file"
      options: { max-size: "20m", max-file: "5" }

  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
      target:     production
    container_name: bibelo_frontend
    restart: unless-stopped
    environment:
      TZ:            America/Sao_Paulo
      NODE_ENV:      production
      VITE_API_URL:  /api
      VITE_APP_NAME: BibelôCRM
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - bibelo_internal
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }

  medusa:
    build:
      context:    ./medusa
      dockerfile: Dockerfile
      target:     production
    container_name: bibelo_medusa
    restart: unless-stopped
    environment:
      TZ:            America/Sao_Paulo
      NODE_ENV:      production
      DATABASE_URL:  postgresql://${DB_USER}:${DB_PASS}@postgres:5432/medusa_db?sslmode=disable
      REDIS_URL:     redis://:${REDIS_PASS}@redis:6379/2
      JWT_SECRET:    ${MEDUSA_JWT_SECRET}
      COOKIE_SECRET: ${MEDUSA_COOKIE_SECRET}
      STORE_CORS:    ${MEDUSA_STORE_CORS:-http://localhost:8000,https://papelariabibelo.com.br,https://homolog.papelariabibelo.com.br}
      ADMIN_CORS:    ${MEDUSA_ADMIN_CORS:-http://localhost:9000,https://api.papelariabibelo.com.br}
      AUTH_CORS:     ${MEDUSA_AUTH_CORS:-http://localhost:8000,https://papelariabibelo.com.br,https://homolog.papelariabibelo.com.br}
      PORT:          "9000"
      MP_ACCESS_TOKEN:    ${MP_ACCESS_TOKEN}
      MP_WEBHOOK_SECRET:  ${MP_WEBHOOK_SECRET}
      MP_PUBLIC_KEY:      ${MP_PUBLIC_KEY}
      MP_SANDBOX:         ${MP_SANDBOX:-true}
      ME_CLIENT_ID:       ${ME_CLIENT_ID}
      ME_CLIENT_SECRET:   ${ME_CLIENT_SECRET}
      ME_REDIRECT_URI:    ${ME_REDIRECT_URI}
      ME_SANDBOX:         ${ME_SANDBOX:-false}
    ports:
      - "127.0.0.1:9000:9000"
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    networks:
      - bibelo_internal
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:9000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout:  10s
      retries:  5
      start_period: 60s
    logging:
      driver: "json-file"
      options: { max-size: "20m", max-file: "5" }

  storefront:
    build:
      context:    ./storefront
      dockerfile: Dockerfile
      network:    host
      args:
        NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: ${STOREFRONT_PUBLISHABLE_KEY}
        NEXT_PUBLIC_MEDUSA_BACKEND_URL:     ${STOREFRONT_PUBLIC_BACKEND_URL:-https://homolog.papelariabibelo.com.br/api}
        NEXT_PUBLIC_BASE_URL:               ${STOREFRONT_PUBLIC_BASE_URL:-https://homolog.papelariabibelo.com.br}
        NEXT_PUBLIC_DEFAULT_REGION:         br
        MEDUSA_BACKEND_URL:                 http://localhost:9000
    container_name: bibelo_storefront
    restart: unless-stopped
    environment:
      TZ:                 America/Sao_Paulo
      NODE_ENV:           production
      MEDUSA_BACKEND_URL: http://bibelo_medusa:9000
      NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: ${STOREFRONT_PUBLISHABLE_KEY}
      REVALIDATE_SECRET:  ${REVALIDATE_SECRET:-bibelo-revalidate-homolog-2026}
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      medusa: { condition: service_healthy }
    networks:
      - bibelo_internal
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000/"]
      interval: 30s
      timeout:  5s
      retries:  5
      start_period: 30s
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }

  uptime:
    image: louislam/uptime-kuma:1
    container_name: bibelo_uptime
    restart: unless-stopped
    environment:
      TZ: America/Sao_Paulo
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - ./data/uptime:/app/data
    networks:
      - bibelo_internal
    logging:
      driver: "json-file"
      options: { max-size: "5m", max-file: "2" }

networks:
  bibelo_internal:
    driver: bridge
    name:   bibelo_network
    ipam:
      config:
        - subnet: 172.21.0.0/16

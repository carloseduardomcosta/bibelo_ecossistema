name: bibelocrm

services:

  postgres:
    image: postgres:16-alpine
    container_name: bibelo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - bibelo_internal
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout:  5s
      retries:  5
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }

  redis:
    image: redis:7-alpine
    container_name: bibelo_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASS}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - ./data/redis:/data
    networks:
      - bibelo_internal
    healthcheck:
      test:     ["CMD", "redis-cli", "-a", "${REDIS_PASS}", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5
    logging:
      driver: "json-file"
      options: { max-size: "5m", max-file: "2" }

  api:
    build:
      context:    ./api
      dockerfile: Dockerfile
      target:     production
    container_name: bibelo_api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV:   production
      DB_HOST:    postgres
      REDIS_HOST: redis
    ports:
      - "127.0.0.1:4000:4000"
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    networks:
      - bibelo_internal
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test:         ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval:     30s
      timeout:      10s
      retries:      3
      start_period: 20s
    logging:
      driver: "json-file"
      options: { max-size: "20m", max-file: "5" }

  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
      target:     production
    container_name: bibelo_frontend
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV:      production
      VITE_API_URL:  /api
      VITE_APP_NAME: BibelôCRM
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      api: { condition: service_healthy }
    networks:
      - bibelo_internal
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }

  evolution:
    image: atendai/evolution-api:latest
    container_name: bibelo_whatsapp
    restart: unless-stopped
    environment:
      SERVER_URL:                    http://evolution:8080
      AUTHENTICATION_API_KEY:        ${EVOLUTION_API_KEY}
      DATABASE_ENABLED:              "true"
      DATABASE_PROVIDER:             postgresql
      DATABASE_CONNECTION_URI:       ${DATABASE_URL}
      DATABASE_CONNECTION_CLIENT_NAME: bibelo_evolution
      CACHE_REDIS_ENABLED:           "true"
      CACHE_REDIS_URI:               ${REDIS_URL}
      DEL_INSTANCE:                  "false"
      LOG_LEVEL:                     ERROR
    volumes:
      - ./data/evolution:/evolution/instances
    networks:
      - bibelo_internal
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }

  uptime:
    image: louislam/uptime-kuma:1
    container_name: bibelo_uptime
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - ./data/uptime:/app/data
    networks:
      - bibelo_internal
    logging:
      driver: "json-file"
      options: { max-size: "5m", max-file: "2" }

networks:
  bibelo_internal:
    driver: bridge
    name:   bibelo_network
    ipam:
      config:
        - subnet: 172.21.0.0/16
